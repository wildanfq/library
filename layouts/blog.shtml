<extend template="base.shtml">
<head id="head">
</head>
<body id="body">
	<div :html="$page.content()"></div>

	<div class="post-list" :loop="$page.subpages()">
		<div class="post-item">
			<a class="title" href="$loop.it.link()">
				<h3 :text="$loop.it.title"></h3>
			</a>
			<span class="date" :text="$loop.it.date.format('Jan 02, 2006')"></span>
		</div>
	</div>
</body>
